[project]
name = "pywhispercpp"
version = "1.2.0"
description = "Python bindings for whisper.cpp"
authors = [
    { name = "abdeladim-s" }
]
license = { text = "MIT License" }
dependencies = [
  "numpy~=2.0.0",
  "sounddevice~=0.4.6",
  "webrtcvad~=2.0.10",
  "requests~=2.28.2",
  "tqdm~=4.65.0",
  "platformdirs~=3.1.1",
]
readme = "README.md"
requires-python = ">= 3.10"

[project.urls]
Documentation = "https://abdeladim-s.github.io/pywhispercpp/"
Source = "https://github.com/abdeladim-s/pywhispercpp"
Tracker = "https://github.com/abdeladim-s/pywhispercpp/issues"

[project.optional-dependencies]
examples = [
  "sounddevice",
  "webrtcvad"
]

[project.scripts]
pwcpp = "pywhispercpp.examples.main:main"
pwcpp-assistant = "pywhispercpp.examples.assistant:_main"
pwcpp-livestream = "pywhispercpp.examples.livestream:_main"
pwcpp-recording = "pywhispercpp.examples.recording:_main"

[build-system]
requires = [
    "setuptools>=42",
    "wheel",
    "ninja",
    "cmake>=3.12",
]
build-backend = "setuptools.build_meta"

[tool.setuptools]

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
pywhispercpp = ["lib/*"]

[tool.mypy]
files = "setup.py"
python_version = "3.10"
strict = true
show_error_codes = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]
warn_unreachable = true

[[tool.mypy.overrides]]
module = ["ninja"]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = ["-ra", "--showlocals", "--strict-markers", "--strict-config"]
xfail_strict = true
filterwarnings = ["error"]
testpaths = ["tests"]

[tool.cibuildwheel]
#test-command = "pytest {project}/tests"
#test-extras = ["test"]
test-skip = ["*universal2:arm64"]
# Setuptools bug causes collision between pypy and cpython artifacts
before-build = "rm -rf {project}/build"

[tool.ruff]
extend-select = [
  "B",    # flake8-bugbear
  "B904",
  "I",    # isort
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",   # Line too long
]
target-version = "py39"